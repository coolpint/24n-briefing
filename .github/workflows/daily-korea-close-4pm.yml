name: daily-korea-close-1530

on:
  schedule:
    # 15:40 KST = 06:40 UTC (Mon-Fri) / 15:30 마감 반영 후 10분 지연 실행
    - cron: '40 6 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  korea-close:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          pip install pykrx

      - name: Generate korea close brief
        run: |
          python scripts/generate_korea_close_brief.py

      - name: Send Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python scripts/send_korea_close_telegram.py

      - name: Commit output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/24n-korea-close-*.md || true
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "chore: generate daily korea close 4pm brief"
          git push
